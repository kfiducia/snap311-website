name: Publish prebuilt aging snapshot (one-shot)

# TEMPORARY bridge: uploads the aging.json committed on this branch straight to
# R2, WITHOUT hitting DC's ArcGIS. Used to publish a locally-built snapshot
# while DC's ArcGIS is in an outage so the normal daily build can't run.
# Delete this workflow + the committed aging.json once DC recovers and the
# scheduled update-aging-snapshot job takes over.

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify aging.json is present and valid JSON
        run: |
          test -f aging.json
          python3 -c "import json; d=json.load(open('aging.json')); print('pts:', len(d['pts']), 'staleHidden:', d.get('staleHidden'))"
          ls -la aging.json

      - name: Upload to R2 (S3 API)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
        run: |
          aws s3 cp aging.json s3://snap311-data/aging.json \
            --endpoint-url "$R2_S3_ENDPOINT" \
            --content-type application/json \
            --cache-control "max-age=21600"
